<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeiligBlox - basis</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        #build-menu {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 12px;
            color: white;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
        }
        .color-btn.active {
            border-color: white;
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status">✅ Geladen</div>

    <div id="build-menu">
        <div style="color:#ffcc00; font-weight:bold; font-size:12px; text-align:center;">KIES KLEUR</div>
        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:4px;">
            <button class="color-btn active" style="background:#ff6b6b;" data-color="#ff6b6b"></button>
            <button class="color-btn" style="background:#ffcc00;" data-color="#ffcc00"></button>
            <button class="color-btn" style="background:#4ecdc4;" data-color="#4ecdc4"></button>
            <button class="color-btn" style="background:#45b7d1;" data-color="#45b7d1"></button>
            <button class="color-btn" style="background:#a29bfe;" data-color="#a29bfe"></button>
            <button class="color-btn" style="background:#ff9ff3;" data-color="#ff9ff3"></button>
        </div>
        <button id="delete-btn" style="background:#ff4444; border:none; color:white; padding:6px; border-radius:6px; cursor:pointer; font-weight:bold;">🗑️ Verwijder (rechterklik)</button>
        <button id="clear-btn" style="background:#ffaa00; border:none; color:#1a1a2e; padding:6px; border-radius:6px; cursor:pointer; font-weight:bold;">🧹 Alles weg</button>
    </div>

    <div id="info">🖱️ Klik op de grond om een blok te plaatsen · Rechterklik op een blok om het te verwijderen · Sleep om te draaien · Scroll om te zoomen</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        console.log("Script gestart!");

        // --- CONFIG ---
        const BLOCK_SIZE = 0.8;
        const GRID = 0.5;

        // --- STATE ---
        let selectedColor = '#ff6b6b';
        let blocks = [];
        let scene, camera, renderer, ground;
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let camTheta = 0.4;
        let camPhi = 0.6;
        let camDist = 14;

        // --- DOM ---
        const statusDiv = document.getElementById('status');

        // --- SCENE ---
        try {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            console.log("Scene gemaakt");

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            updateCamera();
            console.log("Camera gemaakt");

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.prepend(renderer.domElement);
            console.log("Renderer gemaakt");
        } catch (e) {
            statusDiv.textContent = '❌ Fout: ' + e.message;
            console.error(e);
        }

        // --- VERLICHTING ---
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
        sun.position.set(15, 25, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-10, 5, -10);
        scene.add(fill);
        const hemi = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.4);
        scene.add(hemi);

        // --- GROND ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5da130, roughness: 0.9 });
        ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        ground.name = 'ground';
        scene.add(ground);
        console.log("Grond toegevoegd");

        // --- ROOSTER ---
        const gridHelper = new THREE.GridHelper(30, 20, 0x88ff88, 0x44aa44);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- BOMEN (decoratie) ---
        function addTree(x, z) {
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.5, 1.5, 6),
                new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9 })
            );
            trunk.position.set(x, 0.75, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);
            const leaf = new THREE.Mesh(
                new THREE.SphereGeometry(1.0, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.6 })
            );
            leaf.position.set(x, 2.2, z);
            leaf.castShadow = true;
            leaf.receiveShadow = true;
            scene.add(leaf);
        }
        const treePos = [[-7,-7],[7,-7],[-7,7],[7,7],[0,-8],[-8,0],[8,0],[0,8]];
        treePos.forEach(p => addTree(p[0], p[1]));
        console.log("Bomen toegevoegd");

        // --- STARTBLOKKEN (voorbeeld) ---
        addBlockToScene(0, 0, 0, '#ff6b6b');
        addBlockToScene(1.2, 0, 0, '#45b7d1');
        addBlockToScene(-1.2, 0, 0, '#45b7d1');
        addBlockToScene(0, 0.8, 0, '#ffcc00');
        console.log("Startblokken geplaatst");

        // --- FUNCTIES ---
        function addBlockToScene(x, y, z, color = null) {
            const finalColor = color || selectedColor;
            const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            const mat = new THREE.MeshStandardMaterial({ color: finalColor, roughness: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y + BLOCK_SIZE/2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData.isBlock = true;
            mesh.userData.color = finalColor;
            mesh.userData.x = x;
            mesh.userData.y = y;
            mesh.userData.z = z;
            mesh.name = 'block';
            scene.add(mesh);
            blocks.push(mesh);
            return mesh;
        }

        function removeBlock(mesh) {
            if (!mesh || !mesh.userData.isBlock) return;
            scene.remove(mesh);
            const idx = blocks.indexOf(mesh);
            if (idx > -1) blocks.splice(idx, 1);
            mesh.geometry.dispose();
            mesh.material.dispose();
        }

        function getHeightAt(x, z) {
            let maxY = 0;
            for (let b of blocks) {
                if (Math.abs(b.userData.x - x) < 0.4 && Math.abs(b.userData.z - z) < 0.4) {
                    const top = b.userData.y + BLOCK_SIZE;
                    if (top > maxY) maxY = top;
                }
            }
            return maxY;
        }

        function getGroundIntersection(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);
            if (intersects.length > 0) {
                const point = intersects[0].point;
                const x = Math.round(point.x / GRID) * GRID;
                const z = Math.round(point.z / GRID) * GRID;
                // check of er al een blok staat op deze x,z (op y=0)
                for (let b of blocks) {
                    if (Math.abs(b.userData.x - x) < 0.4 && Math.abs(b.userData.z - z) < 0.4 && Math.abs(b.userData.y - 0) < 0.1) {
                        return null;
                    }
                }
                return { x, z };
            }
            return null;
        }

        function getBlockIntersection(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);
            if (intersects.length > 0) return intersects[0].object;
            return null;
        }

        function updateCamera() {
            const x = camDist * Math.cos(camTheta) * Math.cos(camPhi);
            const y = camDist * Math.sin(camPhi);
            const z = camDist * Math.sin(camTheta) * Math.cos(camPhi);
            camera.position.set(x, y, z);
            camera.lookAt(0, 0, 0);
        }

        // --- CAMERA BEDIENING ---
        const container = renderer.domElement;
        container.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                prevMouse.x = e.clientX;
                prevMouse.y = e.clientY;
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - prevMouse.x;
            const dy = e.clientY - prevMouse.y;
            camTheta -= dx * 0.005;
            camPhi += dy * 0.005;
            camPhi = Math.max(-1.2, Math.min(1.2, camPhi));
            updateCamera();
            prevMouse.x = e.clientX;
            prevMouse.y = e.clientY;
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            camDist += e.deltaY * 0.02;
            camDist = Math.max(4, Math.min(30, camDist));
            updateCamera();
        }, { passive: false });

        // --- KLIK EVENTS ---
        container.addEventListener('click', (e) => {
            if (e.button !== 0) return;
            // Verwijder modus? We gebruiken rechterklik voor verwijderen, dus hier alleen plaatsen.
            const pos = getGroundIntersection(e);
            if (pos) {
                const height = getHeightAt(pos.x, pos.z);
                addBlockToScene(pos.x, height, pos.z);
                console.log("Blok geplaatst op", pos.x, height, pos.z);
            }
        });

        container.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const block = getBlockIntersection(e);
            if (block) {
                removeBlock(block);
                console.log("Blok verwijderd");
            }
        });

        // --- UI EVENTS ---
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedColor = this.dataset.color;
            });
        });

        document.getElementById('clear-btn').addEventListener('click', function() {
            if (blocks.length === 0) return;
            if (confirm('Alle blokken verwijderen?')) {
                while (blocks.length > 0) {
                    const b = blocks.pop();
                    scene.remove(b);
                    b.geometry.dispose();
                    b.material.dispose();
                }
                console.log("Alle blokken verwijderd");
            }
        });

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATIE LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        console.log("Alles geladen, pagina zou zichtbaar moeten zijn.");
        statusDiv.textContent = '✅ Actief - ' + blocks.length + ' blokken';
    </script>
</body>
</html>
