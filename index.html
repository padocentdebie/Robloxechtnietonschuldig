<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeiligBlox - Bouw je eigen veilige wereld</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #1a1a2e;
            user-select: none;
        }

        /* === 3D CONTAINER === */
        #game-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* === UI OVERLAY === */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* === HEADER === */
        #header {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ffcc00;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            flex-wrap: wrap;
            gap: 10px;
        }

        #header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff8800;
        }

        #header h1 span {
            color: #ffcc00;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .safe-badge {
            background: #00cc66;
            color: white;
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 0 20px #00cc66;
            border: 1px solid #88ff88;
        }

        .build-counter {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #ffcc00;
        }

        /* === BOUW MENU (links) === */
        #build-menu {
            pointer-events: auto;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 70px;
            align-items: center;
        }

        #build-menu label {
            color: #ffcc00;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .color-btn:hover {
            transform: scale(1.15);
            border-color: white;
        }

        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 15px currentColor;
            transform: scale(1.1);
        }

        .build-btn {
            pointer-events: auto;
            background: #ffcc00;
            color: #1a1a2e;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: inherit;
        }

        .build-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.4);
        }

        .build-btn.delete-mode {
            background: #ff4444;
            color: white;
        }

        .build-btn.delete-mode:hover {
            background: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        /* === VEILIGE CHAT (rechtsonder) === */
        #safe-chat {
            pointer-events: auto;
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 260px;
            background: rgba(10, 10, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
            padding: 14px;
            color: white;
        }

        #safe-chat h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #ffcc00;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #chat-messages {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 8px;
            height: 80px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 8px;
            border: 1px solid #444;
        }

        #chat-messages .msg {
            padding: 3px 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-bottom: 3px;
        }

        #chat-messages .msg .user {
            color: #66ccff;
            font-weight: bold;
        }

        .chat-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .chat-buttons button {
            pointer-events: auto;
            flex: 1 0 auto;
            background: #2a2a4a;
            border: 1px solid #555;
            color: white;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .chat-buttons button:hover {
            background: #ffcc00;
            color: #1a1a2e;
            border-color: #ffcc00;
        }

        /* === POLITIE KNOP === */
        #politie-knop {
            pointer-events: auto;
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #cc0000;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(204, 0, 0, 0.6);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #ff6666;
            font-family: inherit;
            text-decoration: none;
        }

        #politie-knop:hover {
            transform: scale(1.08);
            background: #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8);
        }

        /* === INFO BALK === */
        #info-balk {
            pointer-events: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            color: #ddd;
            font-size: 13px;
            border: 1px solid #ffcc00;
            text-align: center;
            white-space: nowrap;
        }

        #info-balk strong {
            color: #ffcc00;
        }

        /* === INSTRUCTIE === */
        #instructie {
            pointer-events: none;
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            border: 1px solid #ffcc00;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #instructie.show {
            opacity: 1;
        }

        /* === SCROLLBAR === */
        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 10px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            #header h1 {
                font-size: 18px;
            }
            #build-menu {
                left: 10px;
                padding: 12px;
                min-width: 60px;
            }
            .color-btn {
                width: 26px;
                height: 26px;
            }
            #safe-chat {
                width: 200px;
                right: 10px;
                bottom: 10px;
                padding: 10px;
            }
            #safe-chat h3 {
                font-size: 12px;
            }
            .chat-buttons button {
                font-size: 10px;
                padding: 3px 6px;
            }
            #politie-knop {
                font-size: 13px;
                padding: 8px 14px;
                left: 10px;
                bottom: 10px;
            }
            #info-balk {
                font-size: 11px;
                padding: 5px 12px;
                bottom: 70px;
                white-space: normal;
                width: 80%;
            }
            #instructie {
                font-size: 12px;
                padding: 5px 14px;
                top: 75px;
                white-space: normal;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <!-- 3D WERELD -->
    <div id="game-container"></div>

    <!-- UI OVERLAY -->
    <div id="ui-overlay">

        <!-- HEADER -->
        <div id="header">
            <h1>🔲 <span>Veilig</span>Blox</h1>
            <div class="header-right">
                <span class="build-counter">🧱 <span id="block-count">0</span> blokken</span>
                <span class="safe-badge">✅ 100% Veilig</span>
            </div>
        </div>

        <!-- INSTRUCTIE -->
        <div id="instructie" class="show">
            🖱️ <strong>Klik</strong> op de grond om een blok te plaatsen | <strong>Rechterklik</strong> op een blok om het te verwijderen
        </div>

        <!-- BOUW MENU -->
        <div id="build-menu">
            <label>🎨 Kleur</label>
            <div class="color-grid">
                <button class="color-btn active" style="background:#ff6b6b;" data-color="#ff6b6b"></button>
                <button class="color-btn" style="background:#ffcc00;" data-color="#ffcc00"></button>
                <button class="color-btn" style="background:#4ecdc4;" data-color="#4ecdc4"></button>
                <button class="color-btn" style="background:#45b7d1;" data-color="#45b7d1"></button>
                <button class="color-btn" style="background:#a29bfe;" data-color="#a29bfe"></button>
                <button class="color-btn" style="background:#ff9ff3;" data-color="#ff9ff3"></button>
                <button class="color-btn" style="background:#f368e0;" data-color="#f368e0"></button>
                <button class="color-btn" style="background:#00d2d3;" data-color="#00d2d3"></button>
                <button class="color-btn" style="background:#ff9f43;" data-color="#ff9f43"></button>
                <button class="color-btn" style="background:#54a0ff;" data-color="#54a0ff"></button>
                <button class="color-btn" style="background:#5f27cd;" data-color="#5f27cd"></button>
                <button class="color-btn" style="background:#1dd1a1;" data-color="#1dd1a1"></button>
            </div>
            <button class="build-btn delete-mode" id="delete-btn">🗑️ Verwijder</button>
            <button class="build-btn" id="clear-btn">🧹 Alles weg</button>
        </div>

        <!-- VEILIGE CHAT -->
        <div id="safe-chat">
            <h3>💬 Veilige Chat</h3>
            <div id="chat-messages">
                <div class="msg"><span class="user">🟢 Systeem:</span> Bouw je eigen wereld!</div>
            </div>
            <div class="chat-buttons">
                <button data-msg="Wat een leuk bouwwerk!">🏗️ Mooi!</button>
                <button data-msg="Ik bouw een huis.">🏠 Huis</button>
                <button data-msg="Veilig spelen is leuk!">😊 Veilig</button>
                <button data-msg="Kijk eens wat ik gemaakt heb!">👀 Kijk!</button>
                <button data-msg="Doei, tot later!">👋 Doei</button>
            </div>
        </div>

        <!-- POLITIE KNOP -->
        <a href="https://www.politie.nl/onderwerpen/online-oplichting" target="_blank" id="politie-knop">
            🚔 Meld online oplichting
        </a>

        <!-- INFO BALK -->
        <div id="info-balk">
            <strong>🔒 VeiligBlox</strong> — Bouw vrij, geen vreemden, geen risico. 
            <span style="color:#ffcc00;">|</span> Leer veilig bouwen en spelen!
        </div>

    </div>

    <!-- === THREE.JS === -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- === HOOFDSCRIPT === -->
    <script>
        (function() {
            'use strict';

            // --- VARIABELEN ---
            let selectedColor = '#ff6b6b';
            let deleteMode = false;
            let blockCount = 0;
            const blocks = [];
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let scene, camera, renderer;
            let ground;

            // --- DOM REFERENTIES ---
            const blockCountEl = document.getElementById('block-count');
            const deleteBtn = document.getElementById('delete-btn');
            const clearBtn = document.getElementById('clear-btn');
            const instructieEl = document.getElementById('instructie');

            // --- SCENE OPZETTEN ---
            function initScene() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);

                camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(14, 10, 18);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.getElementById('game-container').appendChild(renderer.domElement);

                // --- VERLICHTING ---
                const ambient = new THREE.AmbientLight(0x404060, 0.6);
                scene.add(ambient);

                const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
                sun.position.set(15, 25, 10);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                const d = 25;
                sun.shadow.camera.left = -d;
                sun.shadow.camera.right = d;
                sun.shadow.camera.top = d;
                sun.shadow.camera.bottom = -d;
                sun.shadow.camera.near = 1;
                sun.shadow.camera.far = 40;
                scene.add(sun);

                const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
                fill.position.set(-10, 5, -10);
                scene.add(fill);

                const hemi = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.4);
                scene.add(hemi);
            }

            // --- GROND ---
            function createGround() {
                const geo = new THREE.PlaneGeometry(40, 40);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x5da130,
                    roughness: 0.9,
                    metalness: 0
                });
                ground = new THREE.Mesh(geo, mat);
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = 0;
                ground.receiveShadow = true;
                ground.name = 'ground';
                scene.add(ground);

                // Grid voor visuele referentie
                const gridHelper = new THREE.GridHelper(40, 20, 0x88ff88, 0x44aa44);
                gridHelper.position.y = 0.01;
                scene.add(gridHelper);
            }

            // --- DECORATIE (startbomen en blokken) ---
            function addDecoration() {
                // Boom functie
                function addTree(x, z) {
                    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9 });
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 2, 6), trunkMat);
                    trunk.position.set(x, 1, z);
                    trunk.castShadow = true;
                    trunk.receiveShadow = true;
                    scene.add(trunk);

                    const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.6 });
                    const leaf = new THREE.Mesh(new THREE.SphereGeometry(1.2, 6, 6), leafMat);
                    leaf.position.set(x, 2.8, z);
                    leaf.castShadow = true;
                    leaf.receiveShadow = true;
                    scene.add(leaf);
                }

                // Enkele bomen
                const treePositions = [
                    [-8, -8],
                    [8, -8],
                    [-8, 8],
                    [8, 8],
                    [0, -9],
                    [-9, 0],
                    [9, 0],
                    [0, 9]
                ];
                treePositions.forEach(pos => addTree(pos[0], pos[1]));

                // Een start huisje (als decoratie, niet verwijderbaar)
                function addHouse(x, z) {
                    const wallMat = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), wallMat);
                    wall.position.set(x, 1.25, z);
                    wall.castShadow = true;
                    wall.receiveShadow = true;
                    scene.add(wall);

                    const roofMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
                    const roof = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.3, 3.4), roofMat);
                    roof.position.set(x, 2.8, z);
                    roof.castShadow = true;
                    roof.receiveShadow = true;
                    scene.add(roof);

                    // Ramen (kleine blokjes)
                    const windowMat = new THREE.MeshStandardMaterial({ color: 0x66ccff });
                    const w1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.1), windowMat);
                    w1.position.set(x - 1.2, 1.2, z + 1.51);
                    scene.add(w1);
                    const w2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.1), windowMat);
                    w2.position.set(x + 1.2, 1.2, z + 1.51);
                    scene.add(w2);

                    const doorMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
                    const door = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.1), doorMat);
                    door.position.set(x, 0.6, z + 1.51);
                    scene.add(door);
                }
                addHouse(-4, -3);
                addHouse(5, 4);

                // Een paar startblokken (als voorbeeld, wel verwijderbaar)
                addBlockToScene(0, 0.5, 0, 1, 1, '#ff6b6b');
                addBlockToScene(1.5, 0.5, 1.5, 0.8, 0.8, '#4ecdc4');
                addBlockToScene(-1.5, 0.5, -1.5, 1.2, 0.6, '#ffcc00');
                addBlockToScene(2.5, 0.5, -2, 0.6, 1.2, '#a29bfe');
                addBlockToScene(-2.5, 0.5, 2, 0.8, 1.5, '#ff9ff3');
            }

            // --- BLOK TOEVOEGEN (met physics simpel) ---
            function addBlockToScene(x, y, z, size = 1, color = null) {
                const finalColor = color || selectedColor;
                const geo = new THREE.BoxGeometry(size, size, size);
                const mat = new THREE.MeshStandardMaterial({
                    color: finalColor,
                    roughness: 0.4,
                    metalness: 0.1
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, y + size / 2, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.isBlock = true;
                mesh.userData.size = size;
                mesh.name = 'block';
                scene.add(mesh);
                blocks.push(mesh);
                blockCount++;
                updateBlockCounter();
                return mesh;
            }

            // --- BLOK VERWIJDEREN ---
            function removeBlock(mesh) {
                if (!mesh || !mesh.userData.isBlock) return;
                scene.remove(mesh);
                const idx = blocks.indexOf(mesh);
                if (idx > -1) blocks.splice(idx, 1);
                blockCount--;
                updateBlockCounter();
                // Dispose
                mesh.geometry.dispose();
                mesh.material.dispose();
            }

            // --- COUNTER UPDATE ---
            function updateBlockCounter() {
                blockCountEl.textContent = blockCount;
            }

            // --- RAYCASTER: KLIK OP GROND (plaatsen) ---
            function getGroundIntersection(event) {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const intersects = raycaster.intersectObject(ground);
                if (intersects.length > 0) {
                    const point = intersects[0].point;
                    // Ronden naar grid (stap 0.5 voor mooie uitlijning)
                    const gridSize = 0.5;
                    const x = Math.round(point.x / gridSize) * gridSize;
                    const z = Math.round(point.z / gridSize) * gridSize;
                    // Check of er al een blok staat op die plek (simpel)
                    for (let b of blocks) {
                        const dx = Math.abs(b.position.x - x);
                        const dz = Math.abs(b.position.z - z);
                        if (dx < 0.6 && dz < 0.6 && Math.abs(b.position.y - 0.5) < 0.1) {
                            return null; // plek bezet
                        }
                    }
                    return { x, z };
                }
                return null;
            }

            // --- RAYCASTER: KLIK OP BLOK (verwijderen met rechterklik) ---
            function getBlockIntersection(event) {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const intersects = raycaster.intersectObjects(blocks);
                if (intersects.length > 0) {
                    return intersects[0].object;
                }
                return null;
            }

            // --- EVENTS ---
            function setupEvents() {
                // Linkerklik: plaatsen of verwijderen (als deleteMode aan)
                renderer.domElement.addEventListener('click', function(event) {
                    if (event.button !== 0) return;

                    if (deleteMode) {
                        // Verwijder modus: verwijder het blok waarop geklikt wordt
                        const block = getBlockIntersection(event);
                        if (block && block.userData.isBlock) {
                            removeBlock(block);
                            // Chat feedback
                            addChatMessage('🟢 Systeem', 'Blok verwijderd! 🗑️');
                            instructieEl.textContent = '🗑️ Blok verwijderd! Klik op een ander blok of schakel uit.';
                            instructieEl.classList.add('show');
                            setTimeout(() => {
                                instructieEl.classList.remove('show');
                            }, 2000);
                        }
                        return;
                    }

                    // Normale modus: plaatsen
                    const pos = getGroundIntersection(event);
                    if (pos) {
                        // Kijk of er niet te veel blokken zijn (max 100)
                        if (blockCount >= 100) {
                            addChatMessage('🟢 Systeem', 'Max 100 blokken! 🛑');
                            return;
                        }
                        addBlockToScene(pos.x, 0.5, pos.z, 0.8, selectedColor);
                        addChatMessage('🧑 Bouwer', 'Blok geplaatst! 🧱');
                        instructieEl.textContent = '🧱 Blok geplaatst! Ga zo door!';
                        instructieEl.classList.add('show');
                        setTimeout(() => {
                            instructieEl.classList.remove('show');
                        }, 1500);
                    }
                });

                // Rechterklik: verwijderen (altijd, handig)
                renderer.domElement.addEventListener('contextmenu', function(event) {
                    event.preventDefault();
                    const block = getBlockIntersection(event);
                    if (block && block.userData.isBlock) {
                        removeBlock(block);
                        addChatMessage('🟢 Systeem', 'Blok verwijderd met rechterklik! 🗑️');
                    }
                });

                // Kleurknoppen
                document.querySelectorAll('.color-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        selectedColor = this.dataset.color;
                        // Delete mode uitschakelen bij kleurkeuze
                        if (deleteMode) toggleDeleteMode();
                    });
                });

                // Delete modus toggle
                deleteBtn.addEventListener('click', toggleDeleteMode);

                function toggleDeleteMode() {
                    deleteMode = !deleteMode;
                    deleteBtn.classList.toggle('delete-mode');
                    deleteBtn.textContent = deleteMode ? '✅ Plaatsen' : '🗑️ Verwijder';
                    if (deleteMode) {
                        instructieEl.textContent = '🗑️ VERWIJDERMODUS: klik op een blok om het te verwijderen';
                        instructieEl.classList.add('show');
                    } else {
                        instructieEl.textContent = '🖱️ Klik op de grond om te bouwen!';
                        instructieEl.classList.add('show');
                        setTimeout(() => {
                            instructieEl.classList.remove('show');
                        }, 2000);
                    }
                }

                // Alles wissen
                clearBtn.addEventListener('click', function() {
                    if (blockCount === 0) return;
                    if (confirm('Weet je zeker dat je alle blokken wilt verwijderen?')) {
                        while (blocks.length > 0) {
                            const b = blocks.pop();
                            scene.remove(b);
                            b.geometry.dispose();
                            b.material.dispose();
                        }
                        blockCount = 0;
                        updateBlockCounter();
                        addChatMessage('🟢 Systeem', 'Alle blokken gewist! 🧹');
                    }
                });

                // Chat knoppen
                document.querySelectorAll('.chat-buttons button').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const msg = this.dataset.msg;
                        addChatMessage('🧑 Speler', msg);
                        setTimeout(() => {
                            const antwoorden = [
                                'Leuk! 🤗', 'Mooi gebouwd! 🏗️', 'Veilig hier! 🔒',
                                'Goed idee! 👍', 'Top! 😄', 'Ga zo door! 🌟',
                                'Wat creatief! 🎨', 'Super! ✨'
                            ];
                            const randomAntwoord = antwoorden[Math.floor(Math.random() * antwoorden
                            .length)];
                            addChatMessage('🟢 VeiligBlox', randomAntwoord);
                        }, 600);
                    });
                });
            }

            // --- CHAT HELPER ---
            function addChatMessage(user, text) {
                const container = document.getElementById('chat-messages');
                const msg = document.createElement('div');
                msg.className = 'msg';
                msg.innerHTML = `<span class="user">${user}:</span> ${text}`;
                container.appendChild(msg);
                container.scrollTop = container.scrollHeight;
                while (container.children.length > 30) {
                    container.removeChild(container.firstChild);
                }
            }

            // --- CAMERA BEWEGING (langzaam ronddraaien) ---
            let angle = 0;

            function animate() {
                requestAnimationFrame(animate);
                angle += 0.002;
                const radius = 20;
                camera.position.x = Math.sin(angle) * radius;
                camera.position.z = Math.cos(angle) * radius;
                camera.position.y = 8 + Math.sin(angle * 0.7) * 2;
                camera.lookAt(0, 0, 0);
                renderer.render(scene, camera);
            }

            // --- RESIZE ---
            function onResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // --- INIT ---
            function init() {
                initScene();
                createGround();
                addDecoration();
                setupEvents();
                animate();
                window.addEventListener('resize', onResize);

                // Instructie na 3 seconden verbergen
                setTimeout(() => {
                    instructieEl.classList.remove('show');
                }, 5000);

                // Chat welkom
                setTimeout(() => {
                    addChatMessage('🟢 VeiligBlox', 'Start met bouwen! Klik op de grond 🧱');
                }, 1000);
            }

            // Start alles
            init();

            // Expose voor debugging
            window.__scene = scene;
            window.__blocks = blocks;

        })();
    </script>

</body>
</html>
